name: release-npm

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish after the build (still requires npm environment approval)"
        type: boolean
        default: false
      bootstrap:
        description: "One-time publish of the allow-listed packages that do not exist yet"
        type: boolean
        default: false
  push:
    tags: ["npm-v*", "v*"]

# Builds need only the source tree. The publish job widens this to OIDC locally;
# every established public package trusts this workflow and the protected `npm`
# environment. First releases use the narrow bootstrap job below, then add the same trust.
permissions:
  contents: read

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package_matrix:
    name: resolve facade package matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      labels: ${{ steps.matrix.outputs.labels }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Resolve package labels
        id: matrix
        working-directory: crates/squonk-wasm
        run: |
          echo "labels=$(node --input-type=module -e 'import { packages } from "./scripts/package-matrix.mjs"; process.stdout.write(packages.map(({ label }) => label).join(" "))')" >> "$GITHUB_OUTPUT"
          echo "matrix=$(node --input-type=module -e 'import { packages } from "./scripts/package-matrix.mjs"; process.stdout.write(JSON.stringify(packages.map(({ label }) => label)))')" >> "$GITHUB_OUTPUT"

  native:
    name: native ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      RUSTFLAGS: ${{ matrix.musl && '-C target-feature=-crt-static' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: native-darwin-arm64, target: aarch64-apple-darwin, runner: macos-15 }
          - { label: native-darwin-x64, target: x86_64-apple-darwin, runner: macos-15-intel }
          - { label: native-linux-arm64-gnu, target: aarch64-unknown-linux-gnu, build-target: aarch64-unknown-linux-gnu.2.28, runner: ubuntu-24.04-arm, zig: true }
          - { label: native-linux-x64-gnu, target: x86_64-unknown-linux-gnu, build-target: x86_64-unknown-linux-gnu.2.28, runner: ubuntu-24.04, zig: true }
          - { label: native-linux-arm64-musl, target: aarch64-unknown-linux-musl, runner: ubuntu-24.04-arm, musl: true, zig: true }
          - { label: native-linux-x64-musl, target: x86_64-unknown-linux-musl, runner: ubuntu-24.04, musl: true, zig: true }
          - { label: native-win32-arm64-msvc, target: aarch64-pc-windows-msvc, runner: windows-11-arm }
          - { label: native-win32-x64-msvc, target: x86_64-pc-windows-msvc, runner: windows-2025 }
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: ${{ matrix.zig == true }}
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: "0.14.1"

      - name: Install cargo-zigbuild
        if: ${{ matrix.zig == true }}
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-zigbuild@0.23.0
          fallback: none

      - name: Cache native Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: native-v3-${{ matrix.label }}
          cache-bin: false

      - name: Build Node-API addon
        env:
          SQUONK_NATIVE_PACKAGE: ${{ matrix.label }}
          SQUONK_NATIVE_TARGET: ${{ matrix['build-target'] || matrix.target }}
          SQUONK_CARGO_SUBCOMMAND: ${{ matrix.zig && 'zigbuild' || 'build' }}
        run: npm run build:native

      - name: Smoke native addon
        if: ${{ matrix.musl != true }}
        run: node scripts/smoke-native-addon.mjs native-artifacts/${{ matrix.label }}/squonk.node

      - name: Smoke musl addon in Alpine
        if: ${{ matrix.musl == true }}
        shell: bash
        run: docker run --rm --volume "$PWD:/work" --workdir /work node:24-alpine node scripts/smoke-native-addon.mjs native-artifacts/${{ matrix.label }}/squonk.node

      - name: Upload native addon
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.label }}
          if-no-files-found: error
          retention-days: 7
          path: crates/squonk-wasm/native-artifacts

  wasm:
    name: wasm ${{ matrix.label }}
    needs: package_matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        label: ${{ fromJSON(needs.package_matrix.outputs.matrix) }}
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install Rust toolchain and wasm target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache variant build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: wasm-tooling
          cache-targets: false

      - name: Install wasm-bindgen CLI
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: wasm-bindgen-cli@0.2.108
          fallback: none

      - name: Install Binaryen
        run: npm install --global --ignore-scripts binaryen@130.0.0

      - name: Build WebAssembly package
        env:
          SQUONK_WASM_JOBS: "1"
          SQUONK_WASM_VARIANTS: ${{ matrix.label }}
        run: npm run build:wasm

      - name: Upload WebAssembly package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wasm-${{ matrix.label }}
          if-no-files-found: error
          retention-days: 7
          path: |
            crates/squonk-wasm/pkg-${{ matrix.label }}
            crates/squonk-wasm/size-reports/${{ matrix.label }}.json

  assemble:
    name: assemble npm packages
    needs: [package_matrix, native, wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install JavaScript tooling
        run: npm install --ignore-scripts --no-package-lock

      - name: Download every WebAssembly package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wasm-*
          merge-multiple: true
          path: crates/squonk-wasm

      - name: Verify WebAssembly artifact inventory
        env:
          FACADE_LABELS: ${{ needs.package_matrix.outputs.labels }}
        run: |
          for label in $FACADE_LABELS; do
            test -f "pkg-$label/squonk_wasm_bg.wasm"
            test -f "pkg-$label/deno/squonk_wasm_bg.wasm"
            test -f "size-reports/$label.json"
          done

      - name: Build TypeScript packages
        run: npm run build:ts

      - name: Download every native addon
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-*
          merge-multiple: true
          path: crates/squonk-wasm/native-artifacts

      - name: Stage every facade and platform package
        run: npm run stage

      - name: Verify package versions
        run: npm run check:version

      - name: Upload the verified package tree
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-packages
          if-no-files-found: error
          retention-days: 7
          path: crates/squonk-wasm/dist/npm

      - name: Upload size reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-size-reports
          if-no-files-found: error
          retention-days: 7
          path: crates/squonk-wasm/size-reports

  declarations:
    name: TypeScript declarations
    needs: [package_matrix, assemble]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Install TypeScript tooling
        run: npm install --ignore-scripts --no-package-lock

      - name: Download assembled packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: crates/squonk-wasm/dist/npm

      - name: Restore generated declarations
        env:
          FACADE_LABELS: ${{ needs.package_matrix.outputs.labels }}
        run: |
          cp -R dist/npm/all/js/. js/
          for label in $FACADE_LABELS; do
            cp -R "dist/npm/$label/pkg-$label" .
          done

      - name: Check public declarations
        run: npm run typecheck

  browser-examples:
    name: browser example consumer
    needs: assemble
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Download assembled packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: crates/squonk-wasm/dist/npm

      - name: Restore browser build inputs
        run: |
          cp -R dist/npm/all/js/. js/
          cp -R dist/npm/all/pkg-all .

      - name: Install browser example dependencies
        run: |
          npm --prefix examples/browser install --ignore-scripts --no-package-lock
          npm --prefix examples/browser exec playwright install chromium

      - name: Verify examples in TypeScript and a real browser
        run: |
          npm run examples:typecheck:browser
          npm run examples:build:browser
          npm --prefix examples/browser run test:e2e

  node-example:
    name: Node TypeScript example
    needs: assemble
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Install TypeScript tooling
        run: npm install --ignore-scripts --no-package-lock

      - name: Download assembled packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: crates/squonk-wasm/dist/npm

      - name: Restore generated declarations
        run: cp -R dist/npm/all/js/. js/

      - name: Check the Node example
        run: npm run examples:typecheck:node

  size-policy:
    name: npm size policy
    needs: assemble
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Download assembled packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: crates/squonk-wasm/dist/npm

      - name: Download size reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-size-reports
          path: crates/squonk-wasm/size-reports

      - name: Enforce artifact and tarball budgets
        run: npm run size:check:tarball

  manifest-audit:
    name: npm manifest audit
    needs: assemble
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Download assembled packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: crates/squonk-wasm/dist/npm

      - name: Audit every package manifest
        run: |
          # Use `npm pack --dry-run`, not `npm publish --dry-run`: the latter still
          # consults the registry and fails when the version is already published
          # (bootstrap-then-publish, or a re-run of the release workflow).
          for dir in dist/npm/*; do
            npm pack "$dir" --dry-run
          done

  portable-runtime:
    name: ${{ matrix.runtime }} consumer
    needs: assemble
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        runtime: [bun, deno]
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Set up Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Set up Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: "2.4.3"

      - name: Download verified packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: crates/squonk-wasm/dist/npm

      - name: Exercise the packed package
        env:
          RUNTIME: ${{ matrix.runtime }}
        run: npm run smoke:runtimes -- "$RUNTIME"

  workerd-compat:
    name: workerd consumer
    needs: assemble
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Download assembled packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: crates/squonk-wasm/dist/npm

      - name: Exercise the packed package in workerd
        run: npm run smoke:workerd

  node-compat:
    name: Node ${{ matrix.node }} package consumers
    needs: assemble
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    defaults:
      run:
        working-directory: crates/squonk-wasm
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node }}
          registry-url: https://registry.npmjs.org

      - name: Download verified packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: crates/squonk-wasm/dist/npm

      - name: Smoke direct and packed imports
        run: |
          npm run smoke:variants
          npm run smoke:install

  publish:
    name: publish to npm
    needs: [package_matrix, assemble, declarations, browser-examples, node-example, size-policy, manifest-audit, node-compat, portable-runtime, workerd-compat]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages
    steps:
      - name: Download the verified package tree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: packages

      - name: Set up Node for npm Trusted Publishing
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install the OIDC-capable npm CLI
        run: npm install --global npm@11.18.0

      - name: Require the exact coordinated release tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./all/package.json').version")
          test "$GITHUB_REF" = "refs/tags/v$VERSION"

      - name: Enable publishing in the verified artifacts
        run: |
          for dir in */; do
            npm pkg set private=false --json --prefix "$dir"
          done

      - name: Review every exact publish manifest again
        run: |
          # Pack dry-run only — registry presence is handled by the publish loop below.
          for label in native-darwin-arm64 native-darwin-x64 native-linux-arm64-gnu native-linux-x64-gnu native-linux-arm64-musl native-linux-x64-musl native-win32-arm64-msvc native-win32-x64-msvc ${{ needs.package_matrix.outputs.labels }}; do
            npm pack "./$label" --dry-run
          done

      - name: Publish with OIDC provenance
        run: |
          # If the version is already on the registry (bootstrap, or a prior partial
          # publish), skip it. Native addon rebuilds are not bit-identical across CI
          # runs, so do not require integrity equality with a re-staged artifact.
          for label in native-darwin-arm64 native-darwin-x64 native-linux-arm64-gnu native-linux-x64-gnu native-linux-arm64-musl native-linux-x64-musl native-win32-arm64-msvc native-win32-x64-msvc ${{ needs.package_matrix.outputs.labels }}; do
            NAME=$(node -p "require('./$label/package.json').name")
            VERSION=$(node -p "require('./$label/package.json').version")
            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "$NAME@$VERSION already on npm; skipping"
            else
              npm publish "./$label" --provenance --access public
            fi
          done

  bootstrap:
    name: bootstrap new npm packages
    needs: [package_matrix, assemble, declarations, browser-examples, node-example, size-policy, manifest-audit, node-compat, portable-runtime, workerd-compat]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap == 'true' && github.event.inputs.publish != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
    defaults:
      run:
        working-directory: packages
    steps:
      - name: Download the verified package tree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: packages

      - name: Set up Node for the one-time token-authenticated publish
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install the provenance-capable pre-OIDC npm CLI
        run: npm install --global npm@10.9.4

      - name: Require the bootstrap credential and exact coordinated release tag
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NODE_AUTH_TOKEN:-}"
          VERSION=$(node -p "require('./all/package.json').version")
          test "$GITHUB_REF" = "refs/tags/v$VERSION"

      - name: Enable publishing in the verified artifacts
        run: |
          for dir in */; do
            npm pkg set private=false --json --prefix "$dir"
          done

      - name: Publish only the first-release package allow-list
        shell: bash
        run: |
          set -euo pipefail
          for label in native-darwin-arm64 native-darwin-x64 native-linux-arm64-gnu native-linux-x64-gnu native-linux-arm64-musl native-linux-x64-musl native-win32-arm64-msvc native-win32-x64-msvc quiltdb; do
            NAME=$(node -p "require('./$label/package.json').name")
            VERSION=$(node -p "require('./$label/package.json').version")
            EXPECTED=$(npm pack "./$label" --dry-run --json | node --input-type=module -e 'let s=""; process.stdin.on("data", c => s += c).on("end", () => process.stdout.write(JSON.parse(s)[0].integrity))')
            if PUBLISHED=$(npm view "$NAME@$VERSION" dist.integrity 2>/dev/null); then
              test "$PUBLISHED" = "$EXPECTED"
              echo "$NAME@$VERSION already matches the verified artifact; skipping"
            else
              npm publish "./$label" --provenance --access public
            fi
          done
