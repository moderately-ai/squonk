# Engine-backed oracle suites are independent failure domains. Each engine family
# gets its own runner, dependencies, evidence guard, and cache namespace.

name: oracle-nightly

on:
  schedule:
    - cron: "41 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oracle-nightly
  cancel-in-progress: false

jobs:
  sqlite-duckdb:
    name: SQLite and DuckDB oracles
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DUCKDB_VERSION: "1.5.4"
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: oracle-sqlite-duckdb
          cache-bin: false

      - name: Install cargo-nextest
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-nextest@0.9.140
          fallback: none

      - name: Install libduckdb
        run: |
          curl -sSfL -o "$RUNNER_TEMP/libduckdb.zip" \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/libduckdb-linux-amd64.zip"
          mkdir -p "$RUNNER_TEMP/libduckdb"
          unzip -q "$RUNNER_TEMP/libduckdb.zip" -d "$RUNNER_TEMP/libduckdb"
          test -f "$RUNNER_TEMP/libduckdb/duckdb.h"
          test -f "$RUNNER_TEMP/libduckdb/libduckdb.so"
          {
            echo "DUCKDB_LIB_DIR=$RUNNER_TEMP/libduckdb"
            echo "DUCKDB_INCLUDE_DIR=$RUNNER_TEMP/libduckdb"
            echo "LD_LIBRARY_PATH=$RUNNER_TEMP/libduckdb:${LD_LIBRARY_PATH}"
          } >> "$GITHUB_ENV"

      - name: Run SQLite and DuckDB oracle suite
        run: |
          cargo nextest run -p squonk-conformance --features oracle-engines \
            --success-output final 2>&1 | tee "$RUNNER_TEMP/oracle-output.log"

      - name: Verify both oracles ran
        run: |
          grep -q "oracle-ran: sqlite" "$RUNNER_TEMP/oracle-output.log"
          grep -q "oracle-ran: duckdb" "$RUNNER_TEMP/oracle-output.log"

  mysql:
    name: MySQL oracle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MYSQL_ORACLE_URL: "mysql://root@127.0.0.1:3306"
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: oracle-mysql
          cache-bin: false

      - name: Install cargo-nextest
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-nextest@0.9.140
          fallback: none

      - name: Run MySQL oracle suite
        run: |
          cargo nextest run -p squonk-conformance --features oracle-mysql \
            --success-output final 2>&1 | tee "$RUNNER_TEMP/oracle-output.log"

      - name: Verify the oracle ran
        run: |
          grep -q "oracle-ran: mysql" "$RUNNER_TEMP/oracle-output.log"

  clickhouse:
    name: ClickHouse oracle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: oracle-clickhouse
          cache-bin: false

      - name: Install cargo-nextest
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-nextest@0.9.140
          fallback: none

      - name: Install clickhouse-local
        run: |
          cd "$RUNNER_TEMP"
          curl -sSfL https://clickhouse.com/ | sh
          test -x "$RUNNER_TEMP/clickhouse"
          "$RUNNER_TEMP/clickhouse" local --query "SELECT 1"
          echo "CLICKHOUSE_ORACLE_BIN=$RUNNER_TEMP/clickhouse" >> "$GITHUB_ENV"

      - name: Run ClickHouse oracle suite
        run: |
          cargo nextest run -p squonk-conformance --features oracle-clickhouse \
            --success-output final 2>&1 | tee "$RUNNER_TEMP/oracle-output.log"

      - name: Verify the oracle ran
        run: |
          grep -q "oracle-ran: clickhouse" "$RUNNER_TEMP/oracle-output.log"

  bench-build:
    name: Linux benchmark modules
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: bench-linux
          cache-bin: false

      - name: Build Linux-gated benchmark modules
        run: cargo build -p squonk-bench --all-targets
