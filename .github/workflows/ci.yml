# Per-push / per-PR gate: the core lint/test/doc stack plus the supply-chain gate,
# on every push to `main` and every pull request targeting it. Until now
# `.github/workflows/` held only the nightly soaks (`fuzz-nightly.yml`,
# `oracle-nightly.yml`); nothing enforced the everyday gates on a landing, so
# CI and local verification use the same fixed command.
#
# ADR-0017 ("checks are local-runnable, not CI-coupled"): every gate here is a
# command a contributor already runs locally, and CI merely *invokes* it. The job
# runs ONE `cargo xtask preflight` — the same ordered stack (fmt -> tidy -> clippy
# -> nextest -> doc) contributors run. Engine-backed oracle lanes stay in
# `oracle-nightly.yml`, where their system dependencies are available.
#
# The byte pins that would fail on a non-aarch64 host are `cfg(target_arch)`-gated,
# so the ubuntu-latest nextest lanes run green (proven while building this workflow).
#
# `cargo deny check` (whole-graph supply-chain: advisories / licenses / sources /
# bans; config in `deny.toml`) is a SEPARATE gate, not part of preflight — exactly
# as it is a separate hook in `.pre-commit-config.yaml`, and complementary to
# preflight's in-process `tidy`/`cargo xtask deps` published-surface allowlist (see
# docs/adr/published-dependency-policy.md). It runs as its own step with
# `if: ${{ !cancelled() }}` so a core-stack failure never masks a supply-chain
# regression and vice versa — the independent-failure-domain principle the nightly
# workflows use for their bench-build step.
#
# Bench/criterion perf gating is ADR-0016's separate machinery and is deliberately
# NOT invoked here.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the gates only read the tree.
permissions:
  contents: read

# One run per ref: a newer push / PR update cancels the superseded in-flight run
# (unlike the nightly soaks, which never cancel an in-flight run). `github.ref`
# keys per branch on push and per PR merge-ref on pull_request.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: gate stack (preflight + cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install stable toolchain
        # rust-toolchain.toml pins `stable` + rustfmt/clippy; installed explicitly
        # (matching the nightly workflows' explicit toolchain step) with the
        # components named so the fmt-check and clippy lanes have their tools.
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        # No `workspaces:` override: the gated crates are ordinary members of the
        # root workspace, so the default (repo root) is correct — same as
        # oracle-nightly.yml.

      - name: Install cargo-nextest
        # Prebuilt, checksum-verified binary (no from-source compile). The preflight
        # nextest lanes need it. Version pinned like the nightly workflows so a tool
        # bump is a deliberate, reviewable change.
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-nextest@0.9.140

      - name: Install cargo-deny
        # Supply-chain gate binary (deny.toml requires >= 0.18). Prebuilt + pinned,
        # the same convention as cargo-nextest / cargo-fuzz.
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-deny@0.19.6

      - name: Core gate stack (cargo xtask preflight, non-oracle subset)
        # ONE invocation of the same ordered stack contributors run locally, forced
        # to the whole stack minus the libduckdb/MySQL oracle lanes (see header).
        run: cargo xtask preflight

      - name: Supply-chain gate (cargo deny check)
        # Separate from preflight (see header). `!cancelled()` so it runs even when
        # the core stack failed, surfacing both failure domains in one run.
        if: ${{ !cancelled() }}
        run: cargo deny check

  msrv:
    name: msrv (rust-version floor)
    runs-on: ubuntu-latest
    # `rust-version = "1.85"` in `[workspace.package]` is a v1.0 semver promise
    # (docs/stable-api.md): raising it is a minor-release event. The everyday gates
    # install `stable`, so nothing here proves the published crates still COMPILE at
    # the declared floor — `clippy::incompatible_msrv` only partially covers it (it
    # keys off Clippy's stdlib-stabilization database and misses language features,
    # dependency MSRV floors, and any std API not yet in that table). This job closes
    # that gap by actually building at the floor. It caught a real regression when
    # first added (a test helper used `u*::is_multiple_of`, stable only since 1.87).
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install stable toolchain
        # Runs `cargo-hack` itself. The MSRV toolchain is NOT pinned here: the
        # `--rust-version` step below reads the floor from Cargo.toml (single source
        # of truth) and `cargo hack` provisions it via `rustup toolchain add`, so no
        # hard-coded `1.85` literal appears anywhere in CI.
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-hack
        # Prebuilt, checksum-verified, pinned — same convention as cargo-nextest /
        # cargo-deny above.
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-hack@0.6.45

      - name: Compile the published crates at the declared MSRV
        # `--rust-version` reads `[workspace.package] rust-version` from Cargo.toml
        # and runs the check under exactly that toolchain (no duplicated literal).
        # `--ignore-private` restricts the run to the two published crates
        # (`squonk`, `squonk-ast`); the dev-only members are skipped. `--all-targets`
        # so the crate's own tests/examples stay buildable on the floor too, and
        # `--locked` so the frozen graph is what compiles. Check-only, the norm.
        run: cargo hack check --all-targets --rust-version --workspace --ignore-private --locked

  python:
    name: python runtime and typing
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install Python development tools
        run: python -m pip install 'maturin>=1.7,<2.0' 'pytest>=8' 'ruff>=0.6' 'mypy>=1.15' 'pyright>=1.1.400'
      - name: Build and install wheel
        working-directory: crates/squonk-python
        run: |
          maturin build --out dist
          python -m pip install dist/*.whl
      - name: Check Python runtime and typing contracts
        working-directory: crates/squonk-python
        run: |
          ruff check python
          mypy
          timeout 60s mypy --config-file=/dev/null python/tests/consumer_types.py
          timeout 60s pyright python/tests/consumer_types.py
          # Run outside the binding crate so its `python/` source directory cannot
          # shadow the installed wheel that stubtest is meant to inspect.
          (cd /tmp && timeout 60s python -m mypy.stubtest squonk._ast squonk._exceptions squonk._native)
          pytest
      - name: Validate publication benchmark artifacts
        run: |
          python -m pip install 'matplotlib>=3.9,<4'
          python -m unittest bench.publication.test_publication

  ci-success:
    # Aggregate gate: branch protection on the public `main` requires only this one
    # stable check name (docs/release/cutover.md §5). Adding or renaming a gating job
    # in THIS workflow no longer silently changes what protection must list — the new
    # job just joins `needs` below. `if: always()` so this job runs even when a needed
    # job failed or was cancelled; the step then asserts every needed job SUCCEEDED
    # (a failed/cancelled/skipped upstream job fails the aggregate). This is cargo's
    # `all(.result == "success")` conclusion-job pattern.
    #
    # Scope note: `needs` is within-workflow only, so this cannot cover the `wasm` job
    # in platform.yml — that check stays listed individually in §5 (it is a single,
    # stably-named job with no matrix, so it carries none of the matrix-leg fragility
    # this aggregate exists to absorb). The PR-skipped cross-os matrix is in the other
    # workflow too and is deliberately never a PR gate.
    name: ci-success
    if: always()
    needs: [gates, msrv, python]
    runs-on: ubuntu-latest
    steps:
      - name: Assert every required job succeeded
        # `needs` is passed via env (not interpolated into the script) so the check is
        # expression-injection-clean. `jq --exit-status` returns non-zero unless every
        # needed job's result is "success".
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: jq --exit-status 'all(.result == "success")' <<< "$NEEDS_JSON"
