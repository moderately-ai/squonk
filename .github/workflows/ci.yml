# Per-push / per-PR gates for the core lint, test, documentation, runtime, and
# supply-chain contracts.
#
# ADR-0017 ("checks are local-runnable, not CI-coupled"): every gate here is a
# command a contributor can run locally. CI gives every `cargo xtask preflight`
# step an independent runner; the unfiltered command remains the complete local
# release gate. Engine-backed oracle and benchmark lanes retain their dedicated
# workflows and environments.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the gates only read the tree.
permissions:
  contents: read

# One run per ref: a newer push / PR update cancels the superseded in-flight run
# (unlike the nightly soaks, which never cancel an in-flight run). `github.ref`
# keys per branch on push and per PR merge-ref on pull_request.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: preflight (${{ matrix.lane }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: fmt
            steps: fmt
            nextest: false
          - lane: tidy
            steps: tidy
            nextest: false
          - lane: clippy-default
            steps: clippy-default
            nextest: false
          - lane: clippy-bindings
            steps: clippy-bindings
            nextest: false
          - lane: clippy-conformance
            steps: clippy-conformance
            nextest: false
          - lane: nextest-default
            steps: nextest-default
            nextest: true
          - lane: nextest-bindings
            steps: nextest-bindings
            nextest: true
          - lane: nextest-schema
            steps: nextest-schema
            nextest: true
          - lane: nextest-conformance
            steps: nextest-conformance
            nextest: true
          - lane: doc-default
            steps: doc-default
            nextest: false
          - lane: doc-conformance
            steps: doc-conformance
            nextest: false
          - lane: doc-all-features
            steps: doc-all-features
            nextest: false
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: preflight-${{ matrix.lane }}
          cache-bin: false

      - name: Install cargo-nextest
        if: matrix.nextest
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-nextest@0.9.140
          fallback: none

      - name: Run preflight lane
        run: cargo xtask preflight --only "${{ matrix.steps }}"

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-deny
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-deny@0.19.6
          fallback: none

      - name: Check dependency policy
        run: cargo deny check

  msrv:
    name: msrv (rust-version floor)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # `rust-version = "1.85"` in `[workspace.package]` is a v1.0 semver promise
    # (docs/stable-api.md): raising it is a minor-release event. The everyday gates
    # install `stable`, so nothing here proves the published crates still COMPILE at
    # the declared floor — `clippy::incompatible_msrv` only partially covers it (it
    # keys off Clippy's stdlib-stabilization database and misses language features,
    # dependency MSRV floors, and any std API not yet in that table). This job closes
    # that gap by actually building at the floor. It caught a real regression when
    # first added (a test helper used `u*::is_multiple_of`, stable only since 1.87).
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable toolchain
        # Runs `cargo-hack` itself. The MSRV toolchain is NOT pinned here: the
        # `--rust-version` step below reads the floor from Cargo.toml (single source
        # of truth) and `cargo hack` provisions it via `rustup toolchain add`, so no
        # hard-coded `1.85` literal appears anywhere in CI.
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: msrv
          cache-bin: false

      - name: Install cargo-hack
        # Prebuilt, checksum-verified, pinned — same convention as cargo-nextest /
        # cargo-deny above.
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-hack@0.6.45
          fallback: none

      - name: Compile the published crates at the declared MSRV
        # `--rust-version` reads `[workspace.package] rust-version` from Cargo.toml
        # and runs the check under exactly that toolchain (no duplicated literal).
        # `--ignore-private` restricts the run to the two published crates
        # (`squonk`, `squonk-ast`); the dev-only members are skipped. `--all-targets`
        # so the crate's own tests/examples stay buildable on the floor too, and
        # `--locked` so the frozen graph is what compiles. Check-only, the norm.
        run: cargo hack check --all-targets --rust-version --workspace --ignore-private --locked

  python:
    name: python runtime and typing
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Cache build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: python
          cache-bin: false
      - name: Install Python development tools
        run: python -m pip install 'maturin>=1.7,<2.0' 'pytest>=8' 'ruff>=0.6' 'mypy>=1.15' 'pyright>=1.1.400'
      - name: Build and install wheel
        working-directory: crates/squonk-python
        run: |
          maturin build --out dist
          python -m pip install dist/*.whl
      - name: Check Python runtime and typing contracts
        working-directory: crates/squonk-python
        run: |
          ruff check python
          mypy
          timeout 60s mypy --config-file=/dev/null python/tests/consumer_types.py
          timeout 60s pyright python/tests/consumer_types.py
          # Run outside the binding crate so its `python/` source directory cannot
          # shadow the installed wheel that stubtest is meant to inspect.
          (cd /tmp && timeout 60s python -m mypy.stubtest squonk._ast squonk._exceptions squonk._native)
          pytest
      - name: Validate publication benchmark artifacts
        run: |
          python -m pip install 'matplotlib>=3.9,<4'
          python -m unittest bench.publication.test_publication

  ci-success:
    # Aggregate gate: branch protection on the public `main` requires only this one
    # stable check name (docs/release/cutover.md §5). Adding or renaming a gating job
    # in THIS workflow no longer silently changes what protection must list — the new
    # job just joins `needs` below. `if: always()` so this job runs even when a needed
    # job failed or was cancelled; the step then asserts every needed job SUCCEEDED
    # (a failed/cancelled/skipped upstream job fails the aggregate). This is cargo's
    # `all(.result == "success")` conclusion-job pattern.
    #
    # Scope note: `needs` is within-workflow only, so this cannot cover the `wasm` job
    # in platform.yml — that workflow exposes its own stably named `wasm-success`
    # aggregate for branch protection. The PR-skipped cross-os matrix is in the other
    # workflow too and is deliberately never a PR gate.
    name: ci-success
    if: always()
    needs: [preflight, supply-chain, msrv, python]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Assert every required job succeeded
        # `needs` is passed via env (not interpolated into the script) so the check is
        # expression-injection-clean. `jq --exit-status` returns non-zero unless every
        # needed job's result is "success".
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: jq --exit-status 'all(.result == "success")' <<< "$NEEDS_JSON"
