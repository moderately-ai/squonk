name: Bug report
description: Report a parser bug — SQL that squonk mis-parses, wrongly rejects, or panics on.
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. A parser bug is easiest to fix when it is a single
        self-contained SQL input we can drop straight into a test, so please trim the repro as far as it
        will go.

        For a **security** issue — a panic or unbounded resource use reachable from parsing untrusted SQL —
        do not file here; follow [SECURITY.md](../../SECURITY.md) (private GitHub advisory or
        security@moderately.ai) instead.
  - type: checkboxes
    id: search
    attributes:
      label: Before filing
      options:
        - label: I searched [existing issues](https://github.com/moderately-ai/squonk/issues?q=is%3Aissue) and this is not a duplicate.
          required: true
  - type: input
    id: version
    attributes:
      label: squonk version
      description: The released version or git revision you hit this on.
      placeholder: "1.2.0 (or a commit SHA)"
    validations:
      required: true
  - type: input
    id: rustc
    attributes:
      label: rustc version
      description: Output of `rustc -V`. This records what you built with; it is not a minimum-supported-version question.
      placeholder: "rustc 1.86.0 (05f9846f8 2025-03-31)"
    validations:
      required: true
  - type: dropdown
    id: dialect
    attributes:
      label: Dialect
      description: The dialect preset you parsed with — the `dialect=` argument, or `ansi` if you did not set one.
      options:
        - ansi
        - postgres
        - mysql
        - sqlite
        - duckdb
        - bigquery
        - clickhouse
        - databricks
        - hive
        - mssql
        - redshift
        - snowflake
        - lenient
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal SQL repro
      description: The smallest SQL input that triggers the bug — ideally a single statement.
      render: sql
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What you expected squonk to do (parse, reject, or render) and what it did instead. Paste the exact error or the wrong output.
    validations:
      required: true
