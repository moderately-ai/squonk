regenerate = "Extract the vendored manifest without a full clone via `git archive 08e34c447bae34eaee3723cac61f2878b6bdf787 third_party/libpg_query/grammar/statements.list | tar -xO > statements.list` (or from a duckdb/duckdb checkout at tag v1.5.4), grab LICENSE from the checkout root, then run `python3 extract_stmt_productions.py statements.list stmt-productions.txt`. stmt-productions.txt is the sorted, de-duped set of direct `stmt` alternatives. Then re-baseline the coverage pins against the libduckdb 1.5.4 oracle (discovery is automatic via .cargo/config.toml — do not export DUCKDB_LIB_DIR/DYLD_LIBRARY_PATH): cargo nextest run -p squonk-conformance --features oracle-engines duckdb_statement_production --no-capture"
