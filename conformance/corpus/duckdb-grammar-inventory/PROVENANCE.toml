# verbatim in LICENSE). See README.md for the extraction narrative.
#
# This is the production DENOMINATOR for the DuckDB spec-coverage instrument: the
# sorted set of direct alternatives of DuckDB's top-level `stmt` grammar production,
# pinned to the EXACT upstream commit our in-process libduckdb 1.5.4 oracle links. It
# is independent negative space — it names an upstream production even when no
# vendored corpus statement exercises it — and is distinct from the test-derived
# corpus/duckdb-testsuite and corpus/duckdb-testsuite-tranche2 measurement surfaces.
source = "https://github.com/duckdb/duckdb (third_party/libpg_query/grammar/statements.list — the top-level stmt alternative manifest; scripts/generate_grammar.py materializes the bison `stmt:` rule verbatim from it)"
