# The first release tag of the current major is its immutable API baseline. The
# xtask derives the required tag from the workspace major, preventing a stale
# prior-major baseline from silently skipping compatibility checks. Package paths
# deliberately survive crate-name changes.
schema = 1
baseline_tag = "v2.0.0"
packages = ["crates/squonk-ast", "crates/squonk"]
