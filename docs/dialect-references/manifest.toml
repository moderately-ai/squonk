#
# ============================================================================
# Dialect docs/spec reference library — ACQUISITION MANIFEST
# Owned by: dialect-docs-reference-library. Related: spec-level-coverage-audit-programme.
# ============================================================================
#
# WHAT THIS IS
# A per-dialect, per-artifact registry of the OFFICIAL grammars, SQL-reference doc
# trees, and keyword lists that guide dialect work in this repo. It is the
# reproducible acquisition record (source URL + pinned version + licence verdict +
# storage class + destination) for every dialect we ship or are onboarding, and it
# is the stable citation anchor consumers point at instead of bare, rotting URLs.
# It feeds the oracle-parity-* lanes (grammar-guided generation), the
# spec-level-coverage-audit-programme (production-coverage measurement), and the
# keyword-inventory diffs (the kwlist.h precedent generalized).
#
# ---------------------------------------------------------------------------
# STORAGE CLASSES (licence policy is ABSOLUTE — ADR-0015)
# ---------------------------------------------------------------------------
#   vendorable
#       Permissive licence (PostgreSQL, SQLite public-domain/CC0, Apache-2.0,
#       MIT, BSD, ISC, …; the `cargo xtask license` allowlist). MAY be copied
#       into this repo under docs/dialect-references/corpora/<dialect>/ with a
#       PROVENANCE.toml + LICENSE + per-file `.license` companion — greppable
#       in-repo, and gate-enforced: `corpora/` is a vendored-corpus root, so
#       `cargo xtask license` requires the SPDX marker + provenance on every file.
#   local-only
#       Proprietary but freely readable docs (Oracle, Snowflake, BigQuery, MSSQL,
#       Redshift, Databricks, MySQL docs). NOT redistributable. Lives ONLY in a
#       machine-local library OUTSIDE the repo (~/workspace/dialect-docs/<dialect>/
#       and the builder machine). Only this manifest (URL + version) is committed,
#       so acquisition is reproducible without ever vendoring the bytes.
#   gpl-adjacent-local-only
#       GPL / copyleft sources (the MySQL/MariaDB server grammar + test suites).
#       NEVER linked or vendored — external process at most (run the engine as an
#       accept/reject oracle). Consistent with the server-as-external-process
#       boundary. Manifest records the pin; the bytes never enter the repo.
#
# STATUS field (per entry):
#   vendored       — the bytes are in-repo now under `dest` (permissive + acquired).
#   acquisition    — on the acquisition list for Thomas (see README.md). Either a
#                    local-only download, or a vendorable source not yet cloned
#                    locally (clone-then-vendor).
#   manifest-only  — recorded for reproducibility; no artifact to fetch (e.g. a
#                    hand-written parser with no single grammar file, or a
#                    permissive union with no upstream).
#
# LICENCE VERDICTS are best-knowledge assessments. `verify_on_acquisition = true`
# marks any entry whose exact redistribution terms must be re-checked at download
# time before the bytes are treated as vendorable. Proprietary/GPL verdicts drive
# local-only regardless, so they need no such flag.
#
# ---------------------------------------------------------------------------
# CITATION CONVENTION (consumption seam i — doc-citation discipline)
# ---------------------------------------------------------------------------
# In-repo docs and comments cite a manifest entry by its STABLE `id` plus the
# pinned `version`, NOT a bare URL. The canonical form in a Rust doc/comment:
#
#     dialect-ref: <id> @ <version>   (docs/dialect-references/...)
#
# e.g. `dialect-ref: postgres/kwlist @ REL_18_BETA1-3053-g4b0bf0788b0`. For a
# vendored entry the citation resolves to an in-repo path under `dest`; for a
# local-only entry it resolves to this manifest row (URL + version), which the
# reader acquires per README.md. A URL may still appear once — here, in the
# entry's `source` — so there is exactly one place to fix when it rots.
# Exemplar wired: crates/squonk-ast/src/dialect/ansi.rs (postgres/kwlist).
#
# ---------------------------------------------------------------------------
# VERSION / BUMP PROTOCOL (doc trees move — the sqlite-version precedent)
# ---------------------------------------------------------------------------
# Every entry pins a `version` (release tag, commit, or dated snapshot). A bump is
# a DELIBERATE commit: update the entry's `version` (and, for a vendored entry,
# re-copy the bytes + the PROVENANCE.toml `reference` + re-cite the new version in
# every consumer). Never silently track upstream HEAD. Vendored pins should match
# the corresponding conformance corpus pin where one exists (postgres does today),
# so the reference library and the regression corpus never drift onto different
# upstream revisions.
#
# ============================================================================
# ENTRIES
# ============================================================================

# ---- ANSI / ISO 9075 (baseline; maps to "generic") ----
[[reference]]
id = "ansi/iso-9075"
dialect = "ansi"
kind = "spec"
source = "https://www.iso.org/standard/76583.html (ISO/IEC 9075:2023 — SQL standard)"
version = "ISO/IEC 9075:2023"
license = "ISO copyright (purchasable; not redistributable)"
storage_class = "local-only"
status = "manifest-only"
dest = "~/workspace/dialect-docs/ansi/"
notes = "The strict SQL:2016/2023 baseline the ANSI/generic preset targets. Proprietary ISO document. The PG sql_features.txt entry (postgres/sql_features) is the vendorable, machine-readable proxy for ISO feature coverage."

